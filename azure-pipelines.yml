# Azure Pipelines CI/CD for later-life-planner
# Self-hosted agent runs in Azure Container Apps (scales to zero)

trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

pool:
  name: BlackDog-ACA-Pool  # Self-hosted pool — agent runs as an ACA Job

variables:
  - group: later-life-planner-secrets  # Variable group containing ANTHROPIC_API_KEY
  - name: acrName
    value: acrblackdog69llp
  - name: imageName
    value: later-life-planner
  - name: containerAppName
    value: ca-later-life-planner
  - name: resourceGroup
    value: rg-later-life-planner

stages:
  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  - stage: Test
    displayName: Lint & Test
    jobs:
      - job: RunTests
        displayName: Run lint and Vitest suite
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node 20
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: Install dependencies

          - script: npm run lint
            displayName: Lint

          - script: npm test
            displayName: Unit & integration tests
            env:
              # Tests that need the API key (if any) get it from the variable group
              ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)

  # ── Stage 2: Build & push Docker image ──────────────────────────────────────
  # ACA containers cannot build Docker images (no user namespaces, ACR Tasks blocked).
  # Instead, we trigger a GitHub Actions workflow (ubuntu-latest has Docker daemon).
  - stage: Build
    displayName: Build & Push Image
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - job: DockerBuild
        displayName: Trigger GitHub Actions Docker build and wait
        steps:
          - script: |
              set -euo pipefail
              REPO="durbs182/later-life-planner"
              WORKFLOW="build-and-push.yml"
              IMAGE_TAG="$(Build.BuildId)"

              echo "Triggering GitHub Actions workflow: $WORKFLOW with image_tag=$IMAGE_TAG"
              curl -fsSL -X POST \
                -H "Authorization: token $(GITHUB_PAT)" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW/dispatches" \
                -d "{\"ref\":\"master\",\"inputs\":{\"image_tag\":\"$IMAGE_TAG\"}}"

              echo "Waiting for workflow to start..."
              sleep 10

              # Find the run we just triggered (most recent run of this workflow)
              RUN_ID=$(curl -fsSL \
                -H "Authorization: token $(GITHUB_PAT)" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/$REPO/actions/workflows/$WORKFLOW/runs?per_page=1" \
                | jq -r '.workflow_runs[0].id')
              echo "Workflow run ID: $RUN_ID"

              # Poll until complete
              for i in $(seq 1 40); do
                STATUS=$(curl -fsSL \
                  -H "Authorization: token $(GITHUB_PAT)" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID" \
                  | jq -r '"\(.status) \(.conclusion // "pending")"')
                echo "[$i] $STATUS"
                if echo "$STATUS" | grep -q "^completed"; then
                  if echo "$STATUS" | grep -q "success"; then
                    echo "Build succeeded!"
                    exit 0
                  else
                    echo "Build failed!"
                    exit 1
                  fi
                fi
                sleep 30
              done
              echo "Timeout waiting for GitHub Actions workflow"
              exit 1
            displayName: Trigger and await GitHub Actions Docker build
            env:
              GITHUB_PAT: $(GITHUB_PAT)

  # ── Stage 3: Deploy to Azure Container Apps ──────────────────────────────────
  - stage: Deploy
    displayName: Deploy to ACA
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/master'))
    jobs:
      - job: DeployToACA
        displayName: Update Container App
        steps:
          - task: AzureCLI@2
            displayName: Deploy new image to Container App
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --image $(acrName).azurecr.io/$(imageName):$(Build.BuildId)

          - task: AzureCLI@2
            displayName: Show app URL
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                fqdn=$(az containerapp show \
                  --name $(containerAppName) \
                  --resource-group $(resourceGroup) \
                  --query properties.configuration.ingress.fqdn -o tsv)
                echo "##vso[task.setvariable variable=AppUrl]https://$fqdn"
                echo "Deployed to: https://$fqdn"
