# Azure Pipelines CI/CD for later-life-planner
# Self-hosted agent runs in Azure Container Apps (scales to zero)

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  name: BlackDog-ACA-Pool  # Self-hosted pool — agent runs as an ACA Job

variables:
  - group: later-life-planner-secrets  # Variable group containing ANTHROPIC_API_KEY
  - name: acrName
    value: acrblackdog69llp
  - name: imageName
    value: later-life-planner
  - name: containerAppName
    value: ca-later-life-planner
  - name: resourceGroup
    value: rg-later-life-planner

stages:
  # ── Stage 1: Test ────────────────────────────────────────────────────────────
  - stage: Test
    displayName: Lint & Test
    jobs:
      - job: RunTests
        displayName: Run lint and Vitest suite
        steps:
          - checkout: self

          - task: NodeTool@0
            displayName: Use Node 20
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            displayName: Install dependencies

          - script: npm run lint
            displayName: Lint

          - script: npm test
            displayName: Unit & integration tests
            env:
              # Tests that need the API key (if any) get it from the variable group
              ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)

  # ── Stage 2: Build & push Docker image ──────────────────────────────────────
  - stage: Build
    displayName: Build & Push Image
    dependsOn: Test
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DockerBuild
        displayName: Build image via ACR Tasks (no local Docker needed)
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Build and push via ACR Tasks
            inputs:
              azureSubscription: azure-service-connection
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr build \
                  --registry $(acrName) \
                  --image $(imageName):$(Build.BuildId) \
                  --image $(imageName):latest \
                  --file Dockerfile \
                  .

  # ── Stage 3: Deploy to Azure Container Apps ──────────────────────────────────
  - stage: Deploy
    displayName: Deploy to ACA
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToACA
        displayName: Update Container App
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Deploy new image to Container App
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --image $(acrName).azurecr.io/$(imageName):$(Build.BuildId)

                - task: AzureCLI@2
                  displayName: Show app URL
                  inputs:
                    azureSubscription: azure-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      fqdn=$(az containerapp show \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --query properties.configuration.ingress.fqdn -o tsv)
                      echo "##vso[task.setvariable variable=AppUrl]https://$fqdn"
                      echo "Deployed to: https://$fqdn"
