name: Codex PR Review

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: |
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install Codex CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @openai/codex

      - name: Prepare CODEX_HOME
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: |
          set -euo pipefail
          mkdir -p "$CODEX_HOME"
          chmod 700 "$CODEX_HOME"
          cat > "$CODEX_HOME/config.toml" <<'EOF'
          cli_auth_credentials_store = "file"
          EOF

      - name: Azure login via Codex credential
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0 — latest; no Node 24 release yet, update when available
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_CODEX_KV }}

      - name: Restore auth.json from Azure Key Vault
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
          KEYVAULT_NAME: ${{ secrets.AZURE_KEYVAULT_NAME }}
          KEYVAULT_SECRET_NAME: codex-auth-json
        run: |
          set -euo pipefail
          az keyvault secret show \
            --vault-name "$KEYVAULT_NAME" \
            --name "$KEYVAULT_SECRET_NAME" \
            --query value \
            --output tsv > "$CODEX_HOME/auth.json"
          chmod 600 "$CODEX_HOME/auth.json"

      - name: Run Codex review
        shell: bash
        env:
          CODEX_HOME: ${{ runner.temp }}/.codex
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"
          echo "::error::Intentional failure to verify review-gate branch protection." >&2
          exit 1
          codex exec \
            --ephemeral \
            --full-auto \
            -o codex-review.md \
            "Review pull request #${{ github.event.pull_request.number }} for the Later Life Planner repository against origin/${{ github.base_ref }}. Title: ${{ github.event.pull_request.title }}. Prioritise bugs, behavioural regressions, security issues, deployment or workflow breakage, and missing tests. Ignore style-only suggestions and avoid praise. Present findings first, ordered by severity, with specific file and line references where possible. Keep the review concise. If there are no findings, say 'No findings' and mention any residual risks or testing gaps briefly."
          if ! grep -q '[^[:space:]]' codex-review.md; then
            echo "::error::Codex review output file is empty." >&2
            exit 1
          fi

      - name: Prepare sticky comment
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '<!-- codex-pr-review -->'
            echo '## Codex PR Review'
            echo
            cat codex-review.md
          } > codex-review-comment.md

      - name: Publish PR comment
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          API_ROOT="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          COMMENTS_POST_URL="${API_ROOT}/issues/${PR_NUMBER}/comments"
          COMMENT_ID=""
          for page in 1 2 3 4 5; do
            PAGE_COMMENT_ID=$(
              curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${API_ROOT}/issues/${PR_NUMBER}/comments?per_page=100&page=${page}" |
              jq -r '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- codex-pr-review -->"))) | .id' |
              tail -n 1
            )
            if [ -n "$PAGE_COMMENT_ID" ]; then
              COMMENT_ID="$PAGE_COMMENT_ID"
            fi
            if [ -n "$COMMENT_ID" ]; then
              break
            fi
          done

          jq -Rs '{body: .}' codex-review-comment.md > codex-review-payload.json

          if [ -n "$COMMENT_ID" ]; then
            curl -fsSL \
              -X PATCH \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "${API_ROOT}/issues/comments/${COMMENT_ID}" \
              --data @codex-review-payload.json > /dev/null
          else
            curl -fsSL \
              -X POST \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              "$COMMENTS_POST_URL" \
              --data @codex-review-payload.json > /dev/null
          fi

      - name: Add job summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '## Codex PR Review'
            echo
            cat codex-review.md
          } >> "$GITHUB_STEP_SUMMARY"

  review-gate:
    needs: review
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Codex review result
        shell: bash
        env:
          PR_IS_DRAFT: ${{ github.event.pull_request.draft }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
          REVIEW_RESULT: ${{ needs.review.result }}
        run: |
          set -euo pipefail

          if [ "$PR_IS_DRAFT" = "true" ]; then
            echo "Draft PR; Codex review will be enforced after ready_for_review."
            exit 0
          fi

          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            echo "::error::Codex review is required for merge, but this PR head repo is not trusted for the current secret-backed review workflow." >&2
            exit 1
          fi

          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "::error::Codex review is required for merge, but Dependabot PRs cannot use the current secret-backed review workflow." >&2
            exit 1
          fi

          if [ "$REVIEW_RESULT" != "success" ]; then
            echo "::error::Codex review ended with result: $REVIEW_RESULT" >&2
            exit 1
          fi

          echo "Codex review passed."
