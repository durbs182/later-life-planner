# One-time bootstrap: builds and pushes the self-hosted ADO agent image to ACR.
# Run manually from: Actions tab → Bootstrap ADO Agent Image → Run workflow
name: Bootstrap ADO Agent Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrblackdog69llp

      - name: Build and push ADO agent image
        run: |
          docker build \
            -t acrblackdog69llp.azurecr.io/ado-agent:latest \
            -f infra/agent.Dockerfile \
            infra/
          docker push acrblackdog69llp.azurecr.io/ado-agent:latest

      - name: Summary
        run: echo "Agent image pushed to acrblackdog69llp.azurecr.io/ado-agent:latest"
