# Builds and pushes the app Docker image to ACR.
# Triggered by ADO pipeline Build stage via workflow_dispatch.
name: Build and Push App Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag (e.g. ADO Build.BuildId)
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrblackdog69llp

      - name: Build and push app image
        run: |
          docker build \
            -t acrblackdog69llp.azurecr.io/later-life-planner:${{ inputs.image_tag }} \
            -t acrblackdog69llp.azurecr.io/later-life-planner:latest \
            -f Dockerfile \
            .
          docker push acrblackdog69llp.azurecr.io/later-life-planner:${{ inputs.image_tag }}
          docker push acrblackdog69llp.azurecr.io/later-life-planner:latest

      - name: Summary
        run: echo "Image pushed as acrblackdog69llp.azurecr.io/later-life-planner:${{ inputs.image_tag }}"
