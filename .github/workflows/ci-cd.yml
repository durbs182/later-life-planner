# CI/CD for later-life-planner
# Test on every push/PR to master; build + deploy only when code changes.
# Docs-only changes (docs/, *.md, .github/, infra/) skip build and deploy.
name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Detect whether any code that affects the container changed
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'Dockerfile'
              - '.eslintrc.*'

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: github.ref == 'refs/heads/master' && needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrblackdog69llp

      - name: Build and push image
        run: |
          IMAGE="acrblackdog69llp.azurecr.io/later-life-planner"
          docker build \
            -t "$IMAGE:${{ github.run_number }}" \
            -t "$IMAGE:latest" \
            -f Dockerfile \
            .
          docker push "$IMAGE:${{ github.run_number }}"
          docker push "$IMAGE:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && needs.build-and-push.result == 'success'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --image acrblackdog69llp.azurecr.io/later-life-planner:${{ github.run_number }}

      - name: Show app URL
        run: |
          fqdn=$(az containerapp show \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed to: https://$fqdn"
