# CI/CD for later-life-planner
# Test on every push/PR to master; build + deploy only when code changes.
# Docs-only changes (docs/, *.md, .github/, infra/) skip build and deploy.
# Manual trigger via workflow_dispatch always runs build + deploy.
name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # Detect whether any code that affects the container changed.
  # workflow_dispatch always sets code=true to force a full rebuild.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.mjs'
              - 'tsconfig.json'
              - 'tailwind.config.*'
              - 'postcss.config.*'
              - 'Dockerfile'
              - '.eslintrc.*'

  test:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  build-and-push:
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') &&
      needs.changes.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name acrblackdog69llp

      - name: Build and push image
        run: |
          IMAGE="acrblackdog69llp.azurecr.io/later-life-planner"
          docker build \
            -t "$IMAGE:${{ github.run_number }}" \
            -t "$IMAGE:latest" \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}" \
            -f Dockerfile \
            .
          docker push "$IMAGE:${{ github.run_number }}"
          docker push "$IMAGE:latest"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch') &&
      needs.build-and-push.result == 'success'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update ACA secret and deploy
        run: |
          az containerapp secret set \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --secrets "turnstile-secret-key=${{ secrets.TURNSTILE_SECRET_KEY }}"
          az containerapp update \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --image acrblackdog69llp.azurecr.io/later-life-planner:${{ github.run_number }} \
            --set-env-vars "TURNSTILE_SECRET_KEY=secretref:turnstile-secret-key"

      - name: Restart revision to pick up secret changes
        run: |
          REVISION=$(az containerapp revision list \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --query "[?properties.active].name" -o tsv | head -1)
          az containerapp revision restart \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --revision "$REVISION"
          echo "Restarted revision: $REVISION"

      - name: Show app URL
        run: |
          fqdn=$(az containerapp show \
            --name ca-later-life-planner \
            --resource-group rg-later-life-planner \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Deployed to: https://$fqdn"
