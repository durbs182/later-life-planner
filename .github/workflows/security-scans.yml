name: Security Scans

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: security-scans-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.155.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Semgrep
        id: scan
        shell: sh
        env:
          SEMGREP_SEND_METRICS: 'off'
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            semgrep scan \
              --config p/default \
              --config .semgrep/later-life-planner.yml \
              --error \
              --sarif \
              --output semgrep.sarif \
              --baseline-commit "${{ github.event.pull_request.base.sha }}"
          else
            semgrep scan \
              --config p/default \
              --config .semgrep/later-life-planner.yml \
              --error \
              --sarif \
              --output semgrep.sarif
          fi
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload SARIF
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Summarize Semgrep SARIF
        if: ${{ always() && hashFiles('semgrep.sarif') != '' }}
        id: summarize
        shell: bash
        run: |
          set -euo pipefail
          findings_count=$(jq '[.runs[].results[]?] | length' semgrep.sarif)
          tool_error_count=$(jq '[.runs[].invocations[]?.toolExecutionNotifications[]? | select((.level // "") == "error")] | length' semgrep.sarif)
          tool_warning_count=$(jq '[.runs[].invocations[]?.toolExecutionNotifications[]? | select((.level // "") == "warning")] | length' semgrep.sarif)
          tool_notifications=$(jq -r '.runs[].invocations[]?.toolExecutionNotifications[]? | "[\(.level // "unknown")] \(.message.text // .message.markdown // "no message")"' semgrep.sarif)
          if [ -n "$tool_notifications" ]; then
            echo "$tool_notifications"
          fi
          {
            echo "findings_count=$findings_count"
            echo "tool_error_count=$tool_error_count"
            echo "tool_warning_count=$tool_warning_count"
          } >> "$GITHUB_OUTPUT"

      - name: Fail on Semgrep findings
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f semgrep.sarif ]; then
            echo "::error::Semgrep did not produce a SARIF report."
            exit 1
          fi

          case "${{ steps.scan.outputs.exit_code }}" in
            0|1)
              ;;
            8)
              if [ "${{ steps.summarize.outputs.tool_warning_count }}" = "0" ]; then
                echo "::error::Semgrep exited with code 8 without any SARIF warnings to classify the condition."
                exit 1
              fi
              ;;
            *)
              echo "::error::Semgrep exited unexpectedly with code ${{ steps.scan.outputs.exit_code }}."
              exit 1
              ;;
          esac

          if [ "${{ steps.summarize.outputs.tool_error_count }}" != "0" ]; then
            echo "::error::Semgrep reported tool errors in SARIF."
            exit 1
          fi

          if [ "${{ steps.summarize.outputs.findings_count }}" != "0" ]; then
            echo "::error::Semgrep found blocking findings."
            exit 1
          fi

          if [ "${{ steps.scan.outputs.exit_code }}" = "8" ]; then
            echo "::warning::Semgrep completed with tool warnings but no blocking findings."
          fi

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -o actionlint.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.11/actionlint_1.7.11_linux_amd64.tar.gz
          echo "900919a84f2229bac68ca9cd4103ea297abc35e9689ebb842c6e34a3d1b01b0a  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          sudo mv actionlint /usr/local/bin/actionlint

      - name: Run actionlint
        run: actionlint -color
